spring:
  application:
    name: rinmukt-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${PORT:8080}

rinmukt:
  ai:
    provider: ${AI_PROVIDER:claude}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-haiku-4-5-20251001

logging:
  level:
    in.rinmukt: DEBUG
