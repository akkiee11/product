# Production — uses Postgres (Supabase) and runs Flyway on boot.
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  # Gmail SMTP. App Password is set as SMTP_PASSWORD on Render.
  # Email features no-op silently if SMTP_USERNAME is blank.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

rinmukt:
  email:
    from: ${EMAIL_FROM:${SMTP_USERNAME:}}
    public-base-url: ${PUBLIC_BASE_URL:https://rinmukt.vercel.app}
  admin:
    token: ${ADMIN_TOKEN:}
