# Production — uses Postgres (Supabase) and runs Flyway on boot.
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

rinmukt:
  email:
    # Brevo HTTP API key — port 443, immune to free-tier SMTP blocks.
    brevo-api-key: ${BREVO_API_KEY:}
    from: ${EMAIL_FROM:}
    public-base-url: ${PUBLIC_BASE_URL:https://rinmukt.vercel.app}
  admin:
    token: ${ADMIN_TOKEN:}
